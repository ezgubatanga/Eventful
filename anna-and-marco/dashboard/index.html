<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna & Marco — RSVP Dashboard</title>
  <link rel="icon" type="image/webp" href="/favicon.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #1A1714;
      --surface:    #232018;
      --surface-2:  #2A2520;
      --surface-3:  #332E28;
      --border:     rgba(197,160,89,0.15);
      --border-mid: rgba(197,160,89,0.28);
      --gold:       #C5A059;
      --gold-dark:  #B8903F;
      --gold-light: rgba(197,160,89,0.10);
      --gold-mid:   rgba(197,160,89,0.22);
      --text:       #F0EDE8;
      --muted:      #9E9890;
      --light:      #6E685F;
      --rose:       #D1A3A4;
      --green:      #7FA882;
      --red:        #C47A7A;
      --radius:     12px;
      --radius-lg:  18px;
      --shadow:     0 4px 20px rgba(0,0,0,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Auth overlay ── */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .auth-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .auth-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 28px;
      letter-spacing: 0.04em;
    }
    .auth-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1.5px solid var(--border-mid);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--gold); }
    .auth-btn {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      color: #1A1714;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .auth-btn:hover { background: var(--gold-dark); transform: translateY(-1px); }
    .auth-error {
      font-size: 0.78rem;
      color: var(--red);
      margin-top: 10px;
      display: none;
    }

    /* ── Nav ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26,23,20,0.90);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--gold);
      font-weight: 400;
    }
    .nav-brand span { color: var(--muted); font-size: 0.8rem; font-family: 'Outfit', sans-serif; margin-left: 10px; font-weight: 400; }
    .nav-refresh {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--gold-light);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      padding: 7px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      color: var(--gold);
      cursor: pointer;
      transition: background 0.2s;
    }
    .nav-refresh:hover { background: var(--gold-mid); }
    .nav-refresh svg { width: 14px; height: 14px; }

    /* ── Main ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px 64px;
    }

    /* ── Loading / error ── */
    .state-loading, .state-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      gap: 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid var(--border-mid);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-error { color: var(--red); }

    /* ── KPI cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .kpi-card:hover { border-color: var(--border-mid); }
    .kpi-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .kpi-card.gold::before  { background: linear-gradient(135deg, rgba(197,160,89,0.06), transparent); }
    .kpi-card.green::before { background: linear-gradient(135deg, rgba(127,168,130,0.08), transparent); }
    .kpi-card.red::before   { background: linear-gradient(135deg, rgba(196,122,122,0.08), transparent); }
    .kpi-card.rose::before  { background: linear-gradient(135deg, rgba(209,163,164,0.08), transparent); }
    .kpi-card:hover::before { opacity: 1; }
    .kpi-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .kpi-value {
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .kpi-card.gold  .kpi-value { color: var(--gold); }
    .kpi-card.green .kpi-value { color: var(--green); }
    .kpi-card.red   .kpi-value { color: var(--red); }
    .kpi-card.rose  .kpi-value { color: var(--rose); }
    .kpi-sub {
      font-size: 0.75rem;
      color: var(--light);
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      margin-top: 32px;
    }
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Filter pills ── */
    .filter-pills {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .filter-pill {
      padding: 4px 14px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      border: 1px solid var(--border-mid);
      background: transparent;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .filter-pill:hover { color: var(--text); border-color: var(--gold); }
    .filter-pill.active { background: var(--gold-mid); color: var(--gold); border-color: var(--gold); }

    /* ── Meal bars ── */
    .meal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 22px 18px;
    }
    .meal-card-title {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 18px;
    }
    .meal-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .meal-row:last-child { margin-bottom: 0; }
    .meal-name {
      width: 180px;
      font-size: 0.83rem;
      color: var(--text);
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meal-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--surface-3);
      border-radius: 99px;
      overflow: hidden;
    }
    .meal-bar {
      height: 100%;
      background: var(--gold);
      border-radius: 99px;
      transition: width 0.7s cubic-bezier(0.16,1,0.3,1);
      width: 0%;
    }
    .meal-count {
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--gold);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }
    .meal-empty {
      font-size: 0.83rem;
      color: var(--light);
      font-style: italic;
    }

    /* ── Recent table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      padding: 12px 18px;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid rgba(197,160,89,0.07);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(197,160,89,0.04); }
    tbody td {
      padding: 13px 18px;
      font-size: 0.84rem;
      color: var(--text);
      vertical-align: middle;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .badge-going { background: rgba(127,168,130,0.15); color: var(--green); }
    .badge-no    { background: rgba(196,122,122,0.12); color: var(--red); }
    .td-muted { color: var(--light); }

    /* ── Action buttons in table ── */
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 8px;
      font-size: 0.73rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      border: 1px solid;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .action-btn:active { transform: scale(0.97); }
    .btn-contact {
      background: var(--gold-light);
      border-color: var(--border-mid);
      color: var(--gold);
    }
    .btn-contact:hover { background: var(--gold-mid); }
    .btn-remove {
      background: rgba(196,122,122,0.08);
      border-color: rgba(196,122,122,0.25);
      color: var(--red);
      margin-left: 6px;
    }
    .btn-remove:hover { background: rgba(196,122,122,0.16); }
    .btn-icon { width: 13px; height: 13px; }

    /* ── 3-dots mobile menu ── */
    .btn-dots {
      display: none;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--gold-light);
      border: 1px solid var(--border-mid);
      color: var(--gold);
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-dots:hover { background: var(--gold-mid); }
    .btn-dots svg { width: 16px; height: 16px; pointer-events: none; }
    .td-actions { position: relative; white-space: nowrap; }
    .dots-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% - 4px);
      background: var(--surface-2);
      border: 1px solid var(--border-mid);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      z-index: 200;
      min-width: 140px;
      overflow: hidden;
    }
    .dots-dropdown.open { display: block; }
    .dots-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 11px 16px;
      background: transparent;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s;
    }
    .dots-item svg { width: 14px; height: 14px; flex-shrink: 0; }
    .dots-item:hover { background: var(--surface-3); }
    .dots-item-contact { color: var(--gold); }
    .dots-item-delete  { color: var(--red); border-top: 1px solid var(--border); }

    /* ── Modals ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10,8,6,0.75);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      width: 100%;
      max-width: 340px;
      transform: translateY(10px);
      transition: transform 0.2s;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .modal-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 22px;
    }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      width: 48px;
      flex-shrink: 0;
    }
    .contact-value {
      font-size: 0.88rem;
      color: var(--text);
      word-break: break-all;
    }
    .contact-value a {
      color: var(--gold);
      text-decoration: none;
    }
    .contact-value a:hover { text-decoration: underline; }
    .contact-empty { font-size: 0.83rem; color: var(--light); font-style: italic; }
    .modal-close {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.83rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover { background: var(--surface-2); color: var(--text); }

    /* Remove confirm modal */
    .remove-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .remove-warn {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .remove-actions {
      display: flex;
      gap: 10px;
    }
    .remove-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      transition: background 0.15s, transform 0.1s;
    }
    .remove-actions button:active { transform: scale(0.97); }
    .btn-cancel-rm {
      background: transparent;
      border-color: var(--border-mid);
      color: var(--muted);
    }
    .btn-cancel-rm:hover { background: var(--surface-2); color: var(--text); }
    .btn-confirm-rm {
      background: rgba(196,122,122,0.15);
      border-color: rgba(196,122,122,0.35);
      color: var(--red);
    }
    .btn-confirm-rm:hover { background: rgba(196,122,122,0.25); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .nav { padding: 0 16px; }
      .main { padding: 24px 16px 56px; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .kpi-value { font-size: 1.9rem; }
      .meal-name { width: 130px; }
      /* Hide only Date column on mobile */
      thead th:nth-child(5),
      tbody td:nth-child(5) { display: none; }
      /* Compact Going + Guests columns */
      thead th:nth-child(2),
      tbody td:nth-child(2) { width: 1px; white-space: nowrap; padding-left: 8px; padding-right: 8px; }
      thead th:nth-child(3),
      tbody td:nth-child(3) { width: 1px; white-space: nowrap; padding-left: 8px; padding-right: 8px; text-align: center; }
      /* Compact meal text */
      tbody td:nth-child(4) { font-size: 0.76rem; max-width: 90px; white-space: normal; }
      /* 3-dots breathing room */
      .td-actions { padding-right: 16px !important; }
      /* Show 3-dots, hide text buttons */
      .btn-contact, .btn-remove { display: none; }
      .btn-dots { display: inline-flex; }
    }
  </style>
</head>
<body>

  <!-- Auth -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-box">
      <div class="auth-title">Anna &amp; Marco</div>
      <div class="auth-sub">Dashboard Access</div>
      <input class="auth-input" type="text" id="auth-input" value="AnnaMarco2026" autocomplete="current-password" />
      <button class="auth-btn" id="auth-btn">Enter</button>
      <div class="auth-error" id="auth-error">Incorrect password.</div>
    </div>
  </div>

  <!-- Contact modal -->
  <div class="modal-backdrop" id="contact-modal">
    <div class="modal">
      <div class="modal-title" id="contact-modal-name"></div>
      <div class="modal-sub">Contact details</div>
      <div id="contact-modal-body"></div>
      <button class="modal-close" id="contact-modal-close">Close</button>
    </div>
  </div>

  <!-- Remove confirm modal -->
  <div class="modal-backdrop" id="remove-modal">
    <div class="modal">
      <div class="modal-title" style="color:var(--red)">Remove RSVP</div>
      <div class="modal-sub">This cannot be undone.</div>
      <div class="remove-name" id="remove-modal-name"></div>
      <div class="remove-warn">Permanently delete this RSVP entry from the sheet?</div>
      <div class="remove-actions">
        <button class="btn-cancel-rm" id="remove-modal-cancel">Cancel</button>
        <button class="btn-confirm-rm" id="remove-modal-confirm">Delete</button>
      </div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-brand">Anna &amp; Marco <span>RSVP Dashboard</span></div>
    <button class="nav-refresh" id="refresh-btn" aria-label="Refresh data">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Refresh
    </button>
  </nav>

  <!-- Main -->
  <main class="main" id="main" style="display:none">

    <!-- Loading -->
    <div class="state-loading" id="state-loading">
      <div class="spinner"></div>
      Loading RSVP data…
    </div>

    <!-- Error -->
    <div class="state-error" id="state-error" style="display:none">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Failed to load data. Check script URL.
    </div>

    <!-- Content -->
    <div id="content" style="display:none">

      <!-- KPIs -->
      <div class="kpi-grid" id="kpi-grid"></div>

      <!-- Meal breakdown -->
      <div class="section-header">
        <div class="section-title">Meal Choices</div>
        <div class="section-line"></div>
      </div>
      <div id="meal-grid"></div>

      <!-- Recent RSVPs -->
      <div class="section-header" style="margin-top:32px">
        <div class="section-title">Recent RSVPs</div>
        <div class="section-line"></div>
        <div class="filter-pills">
          <button class="filter-pill active" data-filter="all">All</button>
          <button class="filter-pill" data-filter="yes">Attending</button>
          <button class="filter-pill" data-filter="no">Declined</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Going</th>
              <th style="text-align:center">Guests</th>
              <th>Meal</th>
              <th>Date</th>
              <th class="th-actions"></th>
            </tr>
          </thead>
          <tbody id="rsvp-tbody"></tbody>
        </table>
      </div>

    </div>
  </main>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlzoxREgePvEsPzO1Gn53qG483GknKqpaX24kglO54tVRIPJJtd0VG3BpMgKdOimVtBQ/exec';
    const PASS       = 'AnnaMarco2026';

    const MEAL_LABELS = {
      beef:        'Braised Beef Tenderloin',
      chicken:     'Herb-Roasted Chicken',
      fish:        'Pan-Seared Sea Bass',
      vegetarian:  'Roasted Vegetable Risotto'
    };

    // ── Auth ──
    const overlay  = document.getElementById('auth-overlay');
    const authBtn  = document.getElementById('auth-btn');
    const authIn   = document.getElementById('auth-input');
    const authErr  = document.getElementById('auth-error');
    const mainEl   = document.getElementById('main');

    function unlock() {
      if (authIn.value === PASS) {
        overlay.style.display = 'none';
        mainEl.style.display  = 'block';
        loadData();
      } else {
        authErr.style.display = 'block';
        authIn.value = '';
        authIn.focus();
      }
    }

    authBtn.addEventListener('click', unlock);
    authIn.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

    // ── Data ──
    let allRecent      = [];
    let activeFilter   = 'all';
    let currentFiltered = [];

    async function loadData() {
      document.getElementById('state-loading').style.display = 'flex';
      document.getElementById('state-error').style.display   = 'none';
      document.getElementById('content').style.display       = 'none';

      try {
        const res  = await fetch(SCRIPT_URL + '?action=data');
        const data = await res.json();
        allRecent = data.recent || [];
        render(data);
        document.getElementById('state-loading').style.display = 'none';
        document.getElementById('content').style.display       = 'block';
      } catch (err) {
        document.getElementById('state-loading').style.display = 'none';
        document.getElementById('state-error').style.display   = 'flex';
      }
    }

    document.getElementById('refresh-btn').addEventListener('click', loadData);

    // ── Filter pills ──
    document.querySelectorAll('.filter-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        activeFilter = pill.dataset.filter;
        renderTable();
      });
    });

    // ── Render ──
    function render(d) {
      // KPI cards
      document.getElementById('kpi-grid').innerHTML = `
        <div class="kpi-card gold">
          <div class="kpi-label">Total RSVPs</div>
          <div class="kpi-value">${d.total}</div>
          <div class="kpi-sub">responses received</div>
        </div>
        <div class="kpi-card green">
          <div class="kpi-label">Attending</div>
          <div class="kpi-value">${d.going}</div>
          <div class="kpi-sub">confirmed yes</div>
        </div>
        <div class="kpi-card red">
          <div class="kpi-label">Not Attending</div>
          <div class="kpi-value">${d.notGoing}</div>
          <div class="kpi-sub">regrets received</div>
        </div>
        <div class="kpi-card rose">
          <div class="kpi-label">Plus-Ones</div>
          <div class="kpi-value">${d.plusOnes}</div>
          <div class="kpi-sub">bringing a guest</div>
        </div>
        <div class="kpi-card gold">
          <div class="kpi-label">Total Headcount</div>
          <div class="kpi-value">${d.headcount}</div>
          <div class="kpi-sub">expected guests</div>
        </div>
      `;

      // Merge both meal objects
      const combined = {};
      for (const [k, v] of Object.entries(d.meals))  combined[k] = (combined[k] || 0) + v;
      for (const [k, v] of Object.entries(d.meals2)) combined[k] = (combined[k] || 0) + v;
      const maxMeal = Math.max(1, ...Object.values(combined));

      document.getElementById('meal-grid').innerHTML = `
        <div class="meal-card">
          <div class="meal-card-title">All Meal Choices (Guests + Plus-Ones)</div>
          ${renderMealBars(combined, maxMeal) || '<div class="meal-empty">No meal data yet.</div>'}
        </div>
      `;

      requestAnimationFrame(() => {
        document.querySelectorAll('.meal-bar').forEach(bar => {
          bar.style.width = bar.dataset.pct + '%';
        });
      });

      renderTable();
    }

    function renderTable() {
      currentFiltered = activeFilter === 'all'
        ? allRecent
        : allRecent.filter(r => r.attend === activeFilter);

      const tbody = document.getElementById('rsvp-tbody');
      if (!currentFiltered.length) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--light);padding:32px">No RSVPs found.</td></tr>`;
        return;
      }

      tbody.innerHTML = currentFiltered.map((r, i) => `
        <tr>
          <td>${esc(r.name)}</td>
          <td>${r.attend === 'yes'
            ? '<span class="badge badge-going">Yes</span>'
            : '<span class="badge badge-no">No</span>'
          }</td>
          <td class="td-muted">${r.guests === '2' ? '2' : '1'}</td>
          <td class="td-muted">${esc(MEAL_LABELS[r.meal] || r.meal || '—')}</td>
          <td class="td-muted">${esc(r.ts)}</td>
          <td class="td-actions">
            <button class="action-btn btn-contact" data-idx="${i}">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.08 12a19.79 19.79 0 0 1-3-8.6A2 2 0 0 1 3.05 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 5.93 5.93l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              Contact
            </button>
            <button class="action-btn btn-remove" data-idx="${i}">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              Remove
            </button>
            <button class="btn-dots" data-idx="${i}">
              <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
            </button>
            <div class="dots-dropdown" id="dots-dd-${i}">
              <button class="dots-item dots-item-contact" data-action="contact" data-idx="${i}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.08 12a19.79 19.79 0 0 1-3-8.6A2 2 0 0 1 3.05 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 5.93 5.93l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                Contact
              </button>
              <button class="dots-item dots-item-delete" data-action="remove" data-idx="${i}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                Delete
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // Single delegation listener — registered once
    document.getElementById('rsvp-tbody').addEventListener('click', e => {
      const contactBtn = e.target.closest('.btn-contact');
      const removeBtn  = e.target.closest('.btn-remove');
      const dotsBtn    = e.target.closest('.btn-dots');
      const dotsItem   = e.target.closest('.dots-item');

      if (contactBtn) {
        e.stopPropagation();
        openContactModal(currentFiltered[+contactBtn.dataset.idx]);
        return;
      }
      if (removeBtn) {
        e.stopPropagation();
        openRemoveModal(currentFiltered[+removeBtn.dataset.idx]);
        return;
      }
      if (dotsBtn) {
        e.stopPropagation();
        const dd = document.getElementById('dots-dd-' + dotsBtn.dataset.idx);
        const isOpen = dd.classList.contains('open');
        closeAllDropdowns();
        if (!isOpen) dd.classList.add('open');
        return;
      }
      if (dotsItem) {
        e.stopPropagation();
        const idx = +dotsItem.dataset.idx;
        closeAllDropdowns();
        if (dotsItem.dataset.action === 'contact') openContactModal(currentFiltered[idx]);
        if (dotsItem.dataset.action === 'remove')  openRemoveModal(currentFiltered[idx]);
        return;
      }
    });

    function closeAllDropdowns() {
      document.querySelectorAll('.dots-dropdown.open').forEach(d => d.classList.remove('open'));
    }
    document.addEventListener('click', closeAllDropdowns);

    // ── Contact modal ──
    const contactModal     = document.getElementById('contact-modal');
    const contactModalName = document.getElementById('contact-modal-name');
    const contactModalBody = document.getElementById('contact-modal-body');
    document.getElementById('contact-modal-close').addEventListener('click', () => contactModal.classList.remove('open'));
    contactModal.addEventListener('click', e => { if (e.target === contactModal) contactModal.classList.remove('open'); });

    function openContactModal(r) {
      contactModalName.textContent = r.name;
      const emailHtml = r.email
        ? `<a href="mailto:${esc(r.email)}">${esc(r.email)}</a>`
        : '<span class="contact-empty">not provided</span>';
      const phoneRaw  = r.phone ? (r.phone.startsWith('+') ? r.phone : '+' + r.phone) : '';
      const phoneHtml = phoneRaw
        ? `<a href="tel:${esc(phoneRaw)}">${esc(phoneRaw)}</a>`
        : '<span class="contact-empty">not provided</span>';
      contactModalBody.innerHTML = `
        <div class="contact-row">
          <div class="contact-label">Email</div>
          <div class="contact-value">${emailHtml}</div>
        </div>
        <div class="contact-row">
          <div class="contact-label">Phone</div>
          <div class="contact-value">${phoneHtml}</div>
        </div>
      `;
      contactModal.classList.add('open');
    }

    // ── Remove modal ──
    const removeModal    = document.getElementById('remove-modal');
    const removeModalName = document.getElementById('remove-modal-name');
    const removeConfirm  = document.getElementById('remove-modal-confirm');
    let   pendingRemove  = null;

    document.getElementById('remove-modal-cancel').addEventListener('click', () => removeModal.classList.remove('open'));
    removeModal.addEventListener('click', e => { if (e.target === removeModal) removeModal.classList.remove('open'); });

    function openRemoveModal(r) {
      pendingRemove = r;
      removeModalName.textContent = r.name;
      removeModal.classList.add('open');
    }

    removeConfirm.addEventListener('click', async () => {
      if (!pendingRemove) return;
      removeConfirm.textContent = 'Deleting…';
      removeConfirm.disabled = true;
      try {
        await fetch(SCRIPT_URL + '?action=delete&row=' + pendingRemove.row, { mode: 'no-cors' });
        // Optimistically remove from allRecent
        allRecent = allRecent.filter(r => r !== pendingRemove);
        pendingRemove = null;
        removeModal.classList.remove('open');
        renderTable();
      } catch (e) {
        removeConfirm.textContent = 'Error — retry';
      } finally {
        removeConfirm.textContent = 'Delete';
        removeConfirm.disabled = false;
      }
    });

    function renderMealBars(meals, max) {
      const order = ['beef', 'chicken', 'fish', 'vegetarian'];
      const keys  = [...new Set([...order, ...Object.keys(meals)])].filter(k => meals[k]);
      if (!keys.length) return '';
      return keys.map(k => {
        const count = meals[k] || 0;
        const pct   = Math.round((count / max) * 100);
        const label = MEAL_LABELS[k] || k;
        return `
          <div class="meal-row">
            <div class="meal-name" title="${esc(label)}">${esc(label)}</div>
            <div class="meal-bar-wrap">
              <div class="meal-bar" data-pct="${pct}"></div>
            </div>
            <div class="meal-count">${count}</div>
          </div>`;
      }).join('');
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
